<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de Atendimento - Gostinho Mineiro</title>
    <style>
        :root {
            --primary: #d35400;
            --primary-hover: #e67e22;
            --bg: #f9f6f0;
            --card: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card); max-width: 500px; width: 100%; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(211, 84, 0, 0.1); }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; color: var(--primary); margin-bottom: 5px; }
        .header p { font-size: 14px; color: var(--text-light); }
        .info-balao { background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; text-align: center; font-size: 14px; margin-bottom: 25px; font-weight: 600; display: none; }

        .section-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; margin-top: 20px; display: block; color: var(--text); }
        
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; transition: all 0.3s; margin-bottom: 10px; outline: none; }
        input[type="text"]:focus, textarea :focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(211, 84, 0, 0.1); }
        
        /* Estrelas da Nota Geral */
        .stars-container { display: flex; justify-content: space-between; direction: rtl; margin-bottom: 20px; }
        .stars-container input { display: none; }
        .stars-container label { font-size: 36px; color: #ddd; cursor: pointer; transition: color 0.2s; }
        .stars-container label:hover, .stars-container label:hover ~ label, .stars-container input:checked ~ label { color: #f1c40f; }

        /* Opções Rápidas (Sim/Não ou Notas) */
        .options-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .options-group label { flex: 1; text-align: center; padding: 10px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; background: #fff; }
        .options-group input { display: none; }
        .options-group input:checked + label { background: var(--primary); color: white; border-color: var(--primary); font-weight: bold; }

        textarea { resize: none; height: 80px; }
        
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 20px; }
        button:hover { background: var(--primary-hover); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Gostinho Mineiro</h1>
        <p>Sua opinião ajuda a melhorar nosso atendimento!</p>
    </div>

    <!-- Identificação automática da Vendedora exibida ao cliente -->
    <div id="balao-vendedora" class="info-balao"></div>

    <form action="https://script.google.com/macros/s/AKfycbwvYLcBCvuJiqQHiiD9vCY4RP-QOHpK_D7pyKa6faNUzfG6Kgfa4Mvb6LNtG0n_xQJXAg/exec" method="POST">
        
        <!-- Campos Ocultos preenchidos via Link -->
        <input type="hidden" name="loja" id="loja">
        <input type="hidden" name="vendedora" id="vendedora">

        <!-- Campo de Identificação Simplificado -->
        <label class="section-title">Seu CPF ou CNPJ</label>
        <input type="text" name="documento" placeholder="000.000.000-00 ou 00.000.000/0001-00" required>

        <!-- Avaliação Geral (Estrelas) -->
        <label class="section-title">Nota Geral do Atendimento</label>
        <div class="stars-container">
            <input type="radio" id="star5" name="notaGeral" value="5" required><label for="star5">★</label>
            <input type="radio" id="star4" name="notaGeral" value="4"><label for="star4">★</label>
            <input type="radio" id="star3" name="notaGeral" value="3"><label for="star3">★</label>
            <input type="radio" id="star2" name="notaGeral" value="2"><label for="star2">★</label>
            <input type="radio" id="star1" name="notaGeral" value="1"><label for="star1">★</label>
        </div>

        <!-- Critérios Específicos -->
        <label class="section-title">O vendedor demonstrou conhecimento dos produtos?</label>
        <div class="options-group">
            <input type="radio" id="conhec_excelente" name="conhecimento" value="Excelente" required>
            <label for="conhec_excelente">Excelente</label>
            <input type="radio" id="conhec_bom" name="conhecimento" value="Bom">
            <label for="conhec_bom">Bom</label>
            <input type="radio" id="conhec_regular" name="conhecimento" value="Regular">
            <label for="conhec_regular">Regular</label>
        </div>

        <label class="section-title">Como foi a atenção dada a você?</label>
        <div class="options-group">
            <input type="radio" id="atenc_excelente" name="atencao" value="Excelente" required>
            <label for="atenc_excelente">Excelente</label>
            <input type="radio" id="atenc_bom" name="atencao" value="Bom">
            <label for="atenc_bom">Bom</label>
            <input type="radio" id="atenc_regular" name="atencao" value="Regular">
            <label for="atenc_regular">Regular</label>
        </div>

        <label class="section-title">A agilidade no atendimento foi satisfatória?</label>
        <div class="options-group">
            <input type="radio" id="agil_excelente" name="agilidade" value="Excelente" required>
            <label for="agil_excelente">Excelente</label>
            <input type="radio" id="agil_bom" name="agilidade" value="Bom">
            <label for="agil_bom">Bom</label>
            <input type="radio" id="agil_regular" name="agilidade" value="Regular">
            <label for="agil_regular">Regular</label>
        </div>

        <!-- Comentário Adicional -->
        <label class="section-title">Deixe um comentário ou sugestão (Opcional)</label>
        <textarea name="comentario" placeholder="Escreva aqui..."></textarea>

        <button type="submit">Enviar Avaliação</button>
    </form>
</div>

<script>
    // Script inteligente para ler os dados da URL (?loja=Atacado&vendedora=Daiana)
    const urlParams = new URLSearchParams(window.location.search);
    const lojaParam = urlParams.get('loja');
    const vendedoraParam = urlParams.get('vendedora');

    if (lojaParam) document.getElementById('loja').value = lojaParam;
    if (vendedoraParam) {
        document.getElementById('vendedora').value = vendedoraParam;
        const balao = document.getElementById('balao-vendedora');
        balao.innerText = `Você está avaliando o atendimento de: ${vendedoraParam} (${lojaParam || 'Loja Gostinho Mineiro'})`;
        balao.style.display = 'block';
    }
</script>

</body>
</html>
