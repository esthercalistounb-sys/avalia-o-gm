<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de Atendimento - Gostinho Mineiro</title>
    <style>
        body {
            background-color: #9E1B1B; /* Vermelho Colonial/Terracota Clássico do Gostinho Mineiro */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            color: #9E1B1B; /* Vermelho combinando com o fundo */
            margin-bottom: 5px;
            margin-top: 0;
        }
        p {
            color: #555;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .vendedora-info {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
            display: none;
            font-size: 14px;
        }
        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
            margin-top: 15px;
            font-size: 14px;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background-color: #9E1B1B; /* Botão Vermelho combinando */
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #7D1515;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #success-screen {
            display: none;
            padding: 20px 0;
        }
        #success-screen .icon {
            font-size: 60px;
            color: #2ecc71;
            margin-bottom: 15px;
        }
        #success-screen h2 {
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Formulário Principal -->
    <div id="form-wrapper">
        <h2>Gostinho Mineiro</h2>
        <p>Sua opinião é muito importante para nós!</p>

        <!-- Identificação da vendedora -->
        <div id="balao-vendedora" class="vendedora-info"></div>

        <form id="evaluation-form">
            <!-- Campos ocultos para os parâmetros do link -->
            <input type="hidden" name="loja" id="loja">
            <input type="hidden" name="vendedora" id="vendedora">

            <!-- Campo Único de Identificação solicitado (CPF/CNPJ) -->
            <label for="documento">Seu CPF ou CNPJ:</label>
            <input type="text" id="documento" name="documento" placeholder="000.000.000-00" required>

            <label for="notaGeral">Nota Geral do Atendimento:</label>
            <select id="notaGeral" name="notaGeral" required>
                <option value="">Selecione uma nota...</option>
                <option value="5">5 - Excelente</option>
                <option value="4">4 - Muito Bom</option>
                <option value="3">3 - Regular</option>
                <option value="2">2 - Ruim</option>
                <option value="1">1 - Muito Ruim</option>
            </select>

            <label for="conhecimento">O vendedor demonstrou conhecimento dos produtos?</label>
            <select id="conhecimento" name="conhecimento" required>
                <option value="">Selecione...</option>
                <option value="Excelente">Excelente</option>
                <option value="Bom">Bom</option>
                <option value="Regular">Regular</option>
            </select>

            <label for="atencao">Como foi a atenção dada a você?</label>
            <select id="atencao" name="atencao" required>
                <option value="">Selecione...</option>
                <option value="Excelente">Excelente</option>
                <option value="Bom">Bom</option>
                <option value="Regular">Regular</option>
            </select>

            <label for="agilidade">A agilidade no atendimento foi satisfatória?</label>
            <select id="agilidade" name="agilidade" required>
                <option value="">Selecione...</option>
                <option value="Excelente">Excelente</option>
                <option value="Bom">Bom</option>
                <option value="Regular">Regular</option>
            </select>

            <label for="comentario">Deixe um comentário ou sugestão (Opcional):</label>
            <textarea id="comentario" name="comentario" rows="3" placeholder="Escreva aqui..."></textarea>

            <button type="submit" id="submit-btn">Enviar Avaliação</button>
        </form>
    </div>

    <!-- Tela de Sucesso Limpa -->
    <div id="success-screen">
        <div class="icon">✓</div>
        <h2>Avaliação Enviada!</h2>
        <p>Agradecemos muito a sua participação.</p>
    </div>

</div>

<script>
    // 1. Ler parâmetros da URL (?loja=Atacado&vendedora=Daiana)
    const urlParams = new URLSearchParams(window.location.search);
    const lojaParam = urlParams.get('loja');
    const vendedoraParam = urlParams.get('vendedora');

    if (lojaParam) document.getElementById('loja').value = lojaParam;
    if (vendedoraParam) {
        document.getElementById('vendedora').value = vendedoraParam;
        const balao = document.getElementById('balao-vendedora');
        balao.innerText = `Você está avaliando o atendimento de: ${vendedoraParam}`;
        balao.style.display = 'block';
    }

    // 2. Enviar para o Google Sheets em segundo plano (AJAX)
    const form = document.getElementById('evaluation-form');
    const submitBtn = document.getElementById('submit-btn');
    const formWrapper = document.getElementById('form-wrapper');
    const successScreen = document.getElementById('success-screen');

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.innerText = 'Enviando...';

        const formData = new FormData(form);
        const data = {};
        formData.forEach((value, key) => { data[key] = value; });

        fetch(https://script.google.com/macros/s/AKfycbwgPerZQ4QZ_FOxRnvsVvc7pDRFYOrH78UZeUX02SdCWlSozW1zm2n-YStm9WxGtC_atA/exec', {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            formWrapper.style.display = 'none';
            successScreen.style.display = 'block';
        })
        .catch(error => {
            console.error('Erro:', error);
            submitBtn.disabled = false;
            submitBtn.innerText = 'Enviar Avaliação';
            alert('Erro ao enviar. Tente novamente.');
        });
    });
</script>

</body>
</html>
