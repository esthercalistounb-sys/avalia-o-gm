<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de Atendimento - Gostinho Mineiro</title>
    <style>
        body {
            background-color: #8B4513; /* O marrom/terracota acolhedor original */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            color: #8B4513;
            margin-bottom: 10px;
        }
        p {
            color: #555;
            margin-bottom: 20px;
        }
        .vendedora-info {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
            display: none;
        }
        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
            margin-top: 15px;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #8B4513;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #A0522D;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Gostinho Mineiro</h2>
    <p>Sua opinião é muito importante para nós!</p>

    <!-- Identificação da vendedora -->
    <div id="balao-vendedora" class="vendedora-info"></div>

    <!-- Enviando direto para o seu script correto -->
    <form action="https://script.google.com/macros/s/AKfycbzyS8wYno8rZvbdvcNwgWXtbFB6UkI-D490Dg30cEp72wFadWE9LgPPsT5mpjvhe_uuCg/exec" method="POST">
        
        <!-- Parâmetros ocultos do link -->
        <input type="hidden" name="loja" id="loja">
        <input type="hidden" name="vendedora" id="vendedora">

        <!-- Campo do CPF integrado ao modelo antigo -->
        <label for="documento">Seu CPF ou CNPJ:</label>
        <input type="text" id="documento" name="documento" placeholder="000.000.000-00" required>

        <label for="notaGeral">Nota Geral do Atendimento:</label>
        <select id="notaGeral" name="notaGeral" required>
            <option value="">Selecione uma nota...</option>
            <option value="5">5 - Excelente</option>
            <option value="4">4 - Muito Bom</option>
            <option value="3">3 - Regular</option>
            <option value="2">2 - Ruim</option>
            <option value="1">1 - Muito Ruim</option>
        </select>

        <label for="conhecimento">O vendedor demonstrou conhecimento dos produtos?</label>
        <select id="conhecimento" name="conhecimento" required>
            <option value="">Selecione...</option>
            <option value="Excelente">Excelente</option>
            <option value="Bom">Bom</option>
            <option value="Regular">Regular</option>
        </select>

        <label for="atencao">Como foi a atenção dada a você?</label>
        <select id="atencao" name="atencao" required>
            <option value="">Selecione...</option>
            <option value="Excelente">Excelente</option>
            <option value="Bom">Bom</option>
            <option value="Regular">Regular</option>
        </select>

        <label for="agilidade">A agilidade no atendimento foi satisfatória?</label>
        <select id="agilidade" name="agilidade" required>
            <option value="">Selecione...</option>
            <option value="Excelente">Excelente</option>
            <option value="Bom">Bom</option>
            <option value="Regular">Regular</option>
        </select>

        <label for="comentario">Deixe um comentário ou sugestão (Opcional):</label>
        <textarea id="comentario" name="comentario" rows="3" placeholder="Escreva aqui..."></textarea>

        <button type="submit">Enviar Avaliação</button>
    </form>
</div>

<script>
    // Ler parâmetros da URL
    const urlParams = new URLSearchParams(window.location.search);
    const lojaParam = urlParams.get('loja');
    const vendedoraParam = urlParams.get('vendedora');

    if (lojaParam) document.getElementById('loja').value = lojaParam;
    if (vendedoraParam) {
        document.getElementById('vendedora').value = vendedoraParam;
        const balao = document.getElementById('balao-vendedora');
        balao.innerText = `Você está avaliando o atendimento de: ${vendedoraParam}`;
        balao.style.display = 'block';
    }
</script>

</body>
</html>
